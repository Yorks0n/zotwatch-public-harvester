name: Harvest Public Sources

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

concurrency:
  group: harvest
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  harvest:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      OPENALEX_MAILTO: ${{ secrets.OPENALEX_MAILTO }}
      CROSSREF_MAILTO: ${{ secrets.CROSSREF_MAILTO }}
      WORK_RETENTION_DAYS: ${{ vars.WORK_RETENTION_DAYS || '90' }}
      FETCH_RUN_RETENTION_DAYS: ${{ vars.FETCH_RUN_RETENTION_DAYS || '30' }}
      RAW_PAYLOAD_RETENTION_DAYS: ${{ vars.RAW_PAYLOAD_RETENTION_DAYS || '7' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run harvester
        run: python -m src.main harvest-all

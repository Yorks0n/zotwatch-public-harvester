name: Deploy Supabase Functions

on:
  push:
    branches:
      - main
      - master
    paths:
      - "supabase/functions/**"
      - "supabase/config.toml"
      - ".github/workflows/deploy-functions.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        function_name:
          - public-candidates-v1
          - public-candidates-incremental-v1
          - public-candidate-facets-v1
          - public-status-v1
          - public-work-v1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy function
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          supabase functions deploy "${{ matrix.function_name }}" \
            --project-ref "${SUPABASE_PROJECT_REF}" \
            --no-verify-jwt
